services:

  chromadb:
    image: chromadb/chroma:latest
    container_name: normatrix-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    networks:
      - normatrix-net

  preprocessing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normatrix-preprocessing
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_WAIT_RETRIES=15    # quante volte ritentare prima di arrendersi
      - CHROMA_WAIT_INTERVAL=5    # secondi tra un tentativo e l'altro
    volumes:
      - ./documents:/app/documents:ro
    depends_on:
      - chromadb                  # aspetta solo che il container sia started, non healthy
    networks:
      - normatrix-net
    restart: "no"

volumes:
  chroma-data:

networks:
  normatrix-net:
    driver: bridge