services:

  chromadb:
    image: chromadb/chroma:latest
    container_name: normatrix-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    networks:
      - normatrix-net

  preprocessing:
    build:
      context: ./preprocessing
      dockerfile: Dockerfile
    container_name: normatrix-preprocessing
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_WAIT_RETRIES=15
      - CHROMA_WAIT_INTERVAL=5
    volumes:
      - ./documents:/app/documents:ro
    depends_on:
      - chromadb
    networks:
      - normatrix-net
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: normatrix-backend
    ports:
      - "8080:8080"
    # extra_hosts permette al container di raggiungere l'host Linux
    # tramite l'hostname "host.docker.internal" — funziona su Linux e Windows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_WAIT_RETRIES=15
      - CHROMA_WAIT_INTERVAL=5
      - CHROMA_COLLECTION_POLICIES=bank_policies
      - PIPELINE_PATH=/app/pipeline_src
      - DOCUMENTS_DIR=/app/documents
      - RETRIEVER_TOP_K=5
      # Ollama gira sulla VM host — raggiungibile tramite host.docker.internal
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - LLM_TIMEOUT=120
      - COMPLIANCE_THRESHOLD=0.75
    volumes:
      - ./documents:/app/documents
      - ./preprocessing:/app/pipeline_src
    depends_on:
      - chromadb
    networks:
      - normatrix-net

volumes:
  chroma-data:

networks:
  normatrix-net:
    driver: bridge